name: Client

on:
  push:
    branches:
      - ci-push-client-binary-to-gcp #TODO: remove before merging to main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*" # Matches tags like `v0.1.15`, `v10.0.0-rc0`

jobs:
  client-build-publish:
    permissions:
        contents: 'read'
        id-token: 'write'
    runs-on: ubuntu-24.04
    steps:
      - name: 🏧 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
  
      - name: 🏭 Generate bindings and build client
        run: make bindings && make build

      - name: 📦 Archive client binary
        run: |
          tar -czvf linux-amd64.tar.gz -C build .

      - name: 🔐 Authenticate to Google Cloud
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    #   - name: 🔐 Login to Google Artifact Registry
    #     uses: docker/login-action@v3
    #     with:
    #       registry: ${{ inputs.registry }}
    #       username: oauth2accesstoken
    #       password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

